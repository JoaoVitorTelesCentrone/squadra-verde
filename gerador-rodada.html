<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squadra Verde — Gerador de Rodada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg:#0d0d0d; --surface:#111; --surface-2:#1a1a1a; --surface-hover:#1e1e1e;
      --border:#1e1e1e; --border-strong:#2d2d2d;
      --text:#e8e8d8; --text-muted:#888880; --text-faint:#444440;
      --accent:#3d7a54; --accent-hover:#2d5c3f; --accent-dim:rgba(61,122,84,.12); --accent-light:rgba(61,122,84,.18);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

    .hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:12px}
    .hdr-brand{display:flex;align-items:center;gap:10px}
    .hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:.15em;text-transform:uppercase;color:var(--text)}
    .hdr-title span{color:var(--accent)}
    .hdr-actions{display:flex;gap:8px}

    .layout{display:flex;flex:1;overflow:hidden}

    .sb{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
    .ss{padding:14px 16px;border-bottom:1px solid var(--border)}
    .ss-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}

    .fg{margin-bottom:10px}
    .fl{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px}
    .fi,.fta{width:100%;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
    .fi:focus,.fta:focus{border-color:var(--accent)}
    .fta{resize:vertical;min-height:72px;font-size:12px;font-family:'Barlow',sans-serif;line-height:1.5}

    .vt-row{display:flex;gap:5px;flex-wrap:wrap}
    .vt-chip{display:flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--border-strong);background:var(--surface-2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);transition:all .15s}
    .vt-chip:hover{border-color:var(--accent)}
    .vt-chip.active{border-color:var(--accent);background:var(--accent-light);color:var(--text)}
    .vt-dot{width:10px;height:10px;border:1px solid rgba(255,255,255,.12);flex-shrink:0}

    .sl{display:flex;flex-direction:column;gap:4px}
    .sli{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;transition:all .15s}
    .sli:hover{border-color:var(--border-strong)}
    .sli.active{border-color:var(--accent);background:var(--accent-light)}
    .sli-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-faint);min-width:20px}
    .sli.active .sli-n{color:var(--accent)}
    .sli-info{flex:1;min-width:0}
    .sli-type{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
    .sli.active .sli-type{color:var(--accent)}
    .sli-hl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;text-transform:uppercase}

    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a}
    .prev-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
    .prev-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
    .cnt-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--surface-2);padding:3px 10px;border:1px solid var(--border-strong)}
    .prev-scroll{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;align-items:center;padding:28px 36px;gap:20px}

    .sc-wrap{position:relative;cursor:pointer;flex-shrink:0;transition:transform .15s}
    .sc-wrap:hover{transform:translateY(-3px)}
    .sc-wrap.active .sc{box-shadow:0 0 0 2px var(--accent),0 8px 40px rgba(0,0,0,.5)}
    .sc{width:360px;height:360px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5)}
    .sc-num{position:absolute;top:-18px;left:0;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-faint)}
    .sc-wrap.active .sc-num{color:var(--accent)}

    .btn{padding:7px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-ghost{background:transparent;border:1px solid var(--border-strong);color:var(--text-muted)}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
    .toast.show{opacity:1}

    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-strong)}
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <svg width="22" height="26" viewBox="0 0 200 230" fill="none">
      <path d="M100 10 L185 45 L185 130 Q185 185 100 220 Q15 185 15 130 L15 45 Z" fill="none" stroke="#3d7a54" stroke-width="8"/>
      <text x="100" y="140" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="80" fill="#3d7a54">SV</text>
    </svg>
    <span class="hdr-title">Squadra <span>Verde</span> — Gerador de Rodada</span>
  </div>
  <div class="hdr-actions">
    <button class="btn btn-ghost" onclick="exportAll()">⬇ Todos os Slides</button>
    <button class="btn btn-primary" onclick="exportCurrent()">⬇ Slide Atual</button>
  </div>
</header>

<div class="layout">
  <aside class="sb">

    <div class="ss">
      <div class="ss-lbl">Geral</div>
      <div class="fg">
        <label class="fl">Número da Rodada</label>
        <input type="text" class="fi" id="f-round" value="07" oninput="syncGlobals();renderAll()" />
      </div>
      <div class="fg">
        <label class="fl">Data da Rodada</label>
        <input type="text" class="fi" id="f-date" value="10 de maio" oninput="syncGlobals();renderAll()" />
      </div>
      <div class="fg">
        <label class="fl">Temporada</label>
        <input type="text" class="fi" id="f-season" value="2026" oninput="syncGlobals();renderAll()" />
      </div>
      <div class="fg">
        <label class="fl">Estilo Visual</label>
        <div class="vt-row" id="vt-row"></div>
      </div>
    </div>

    <div class="ss">
      <div class="ss-lbl">Slides</div>
      <div class="sl" id="sl"></div>
    </div>

    <div class="ss" id="editor" style="flex:1;overflow-y:auto">
      <div class="ss-lbl">Editar — <span id="ed-name" style="color:var(--accent)">Slide 1</span></div>
      <div id="ed-fields"></div>
    </div>

  </aside>

  <main class="main">
    <div class="prev-bar">
      <span class="prev-lbl">Prévia — 1080 × 1080 px (escala 1:3)</span>
      <span class="cnt-tag">3 slides</span>
    </div>
    <div class="prev-scroll" id="prev-scroll"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── THEMES ───────────────────────────────────────────────────────────────────

    creme:'#e8e8d8', cremeDark:'#d0d0bc', offWhite:'#f4f4ec',
    s1bg:'#f4f4ec', s1t:'#1a3a2a',
    s2bg:'#f8faf5',
    s3bg:'#e8e8d8', s3t:'#1a3a2a' },
  { id:'bold', name:'Bold', dot:'#0d2018',
    verde:'#0d2018', verdeMid:'#1a3a2a', verdeLight:'#2d5c3f',
    creme:'#ffffff', cremeDark:'#e8e8d8', offWhite:'#f4f4ec',
    s1bg:'#f4f4ec', s1t:'#0d2018',
    s2bg:'#f8faf5',
    s3bg:'#e8e8d8', s3t:'#0d2018' },
  { id:'noite', name:'Noite', dot:'#080808',
    verde:'#080808', verdeMid:'#0f0f0f', verdeLight:'#1a3a2a',
    creme:'#e8e8d8', cremeDark:'#c8c8b8', offWhite:'#d4d4cc',
    s1bg:'#111', s1t:'#e8e8d8',
    s2bg:'#0f0f0f',
    s3bg:'#111', s3t:'#e8e8d8' },
];

const SLIDES = [
  { id:'resultado',     name:'Resultado',      num:'01' },
  { id:'classificacao', name:'Classificação',   num:'02' },

];

// ─── STATE ────────────────────────────────────────────────────────────────────
let themeIdx   = 0;
let activeSlide = 0;
const data = {
  round:'07', date:'10 de maio', season:'2026',
  champ:'Centrone / Fox',
  matches:'Silva / Ramos · 6×4 · Costa / Mendes\nCentrone / Fox · 7×5 · Torres / Braga\nFerreira / Lins · 6×3 · Pinto / Melo\nLemos / Costa · 6×2 · Alves / Neves',
  rankDate:'29/04',

  phrase:'Quem para a dupla 1?',
};

// ─── RANKING DATA ─────────────────────────────────────────────────────────────
const RANKING_DATA = {"atualizado_em":"29/04","ranking":[{"posicao":1,"nome":"José Resende","jogos":3,"vitorias":3,"derrotas":0,"percentual_vitorias":100,"games_vencidos":18,"games_perdidos":7,"saldo_games":11},{"posicao":2,"nome":"Riccardo Voso","jogos":3,"vitorias":3,"derrotas":0,"percentual_vitorias":100,"games_vencidos":18,"games_perdidos":7,"saldo_games":11},{"posicao":3,"nome":"João Paulo Fiacadori","jogos":3,"vitorias":3,"derrotas":0,"percentual_vitorias":100,"games_vencidos":18,"games_perdidos":8,"saldo_games":10},{"posicao":4,"nome":"Wagner Santos","jogos":3,"vitorias":3,"derrotas":0,"percentual_vitorias":100,"games_vencidos":20,"games_perdidos":13,"saldo_games":7},{"posicao":5,"nome":"Rodrigo Lolato","jogos":6,"vitorias":5,"derrotas":1,"percentual_vitorias":83,"games_vencidos":34,"games_perdidos":24,"saldo_games":10},{"posicao":6,"nome":"Augusto Oazi","jogos":6,"vitorias":3,"derrotas":3,"percentual_vitorias":50,"games_vencidos":29,"games_perdidos":21,"saldo_games":8},{"posicao":7,"nome":"Alexandre Castro","jogos":6,"vitorias":3,"derrotas":3,"percentual_vitorias":50,"games_vencidos":30,"games_perdidos":34,"saldo_games":-4},{"posicao":8,"nome":"Miguel Centrone","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":17,"games_perdidos":16,"saldo_games":1},{"posicao":9,"nome":"Reginaldo Teiji","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":15,"games_perdidos":15,"saldo_games":0},{"posicao":10,"nome":"Fausto Moretti","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":14,"games_perdidos":15,"saldo_games":-1},{"posicao":11,"nome":"Felippi Cordeiro","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":12,"games_perdidos":15,"saldo_games":-3},{"posicao":12,"nome":"Gustavo Machado","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":12,"games_perdidos":15,"saldo_games":-3},{"posicao":13,"nome":"João Centrone","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":12,"games_perdidos":15,"saldo_games":-3},{"posicao":14,"nome":"William Silva","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":15,"games_perdidos":18,"saldo_games":-3},{"posicao":15,"nome":"Rafael Madi","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":12,"games_perdidos":15,"saldo_games":-3},{"posicao":16,"nome":"Guilherme Machado","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":10,"games_perdidos":15,"saldo_games":-5},{"posicao":17,"nome":"Rafael Carioca","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":9,"games_perdidos":15,"saldo_games":-6},{"posicao":18,"nome":"Marcelo Cavalieri","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":9,"games_perdidos":16,"saldo_games":-7},{"posicao":19,"nome":"Adriano Marchioreto","jogos":3,"vitorias":1,"derrotas":2,"percentual_vitorias":33,"games_vencidos":9,"games_perdidos":16,"saldo_games":-7},{"posicao":20,"nome":"Fábio Lodi","jogos":3,"vitorias":0,"derrotas":3,"percentual_vitorias":0,"games_vencidos":9,"games_perdidos":18,"saldo_games":-9},{"posicao":21,"nome":"Diego Rinaldi","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":22,"nome":"Dudu Batista","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":23,"nome":"João Pedro Viberti","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":24,"nome":"Julio Castilho","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":25,"nome":"Márcio Junqueira","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":26,"nome":"Osmar Vendramel","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":27,"nome":"Renato Cima","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":28,"nome":"Renato Santoro","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":29,"nome":"Sylvano Appoloni","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":30,"nome":"Pedro Vita","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":31,"nome":"Tiago Carioca","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0},{"posicao":32,"nome":"Zenon Barcelos","jogos":0,"vitorias":0,"derrotas":0,"percentual_vitorias":0,"games_vencidos":0,"games_perdidos":0,"saldo_games":0}]};

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('vt-row').innerHTML = THEMES.map((t,i) =>
    `<button class="vt-chip ${i===0?'active':''}" onclick="setTheme(${i})">
      <span class="vt-dot" style="background:${t.dot}"></span>${t.name}
    </button>`
  ).join('');
  renderSlideList();
  selectSlide(0);
  renderAll();
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function setTheme(i) {
  themeIdx = i;
  document.querySelectorAll('.vt-chip').forEach((c,j) => c.classList.toggle('active', j===i));
  renderAll();
}

// ─── GLOBAL SYNC ──────────────────────────────────────────────────────────────
function syncGlobals() {
  data.round   = document.getElementById('f-round')?.value  || '07';
  data.date    = document.getElementById('f-date')?.value   || '10 de maio';
  data.season  = document.getElementById('f-season')?.value || '2026';
}

// ─── SLIDE LIST ───────────────────────────────────────────────────────────────
function renderSlideList() {
  const previews = [
    '🏆 ' + (data.champ||'—'),
    `Após Rodada ${data.round}`,
    data.nextDate||'—',
  ];
  document.getElementById('sl').innerHTML = SLIDES.map((s,i) =>
    `<div class="sli ${i===activeSlide?'active':''}" onclick="selectSlide(${i})">
      <div class="sli-n">${s.num}</div>
      <div class="sli-info">
        <div class="sli-type">${s.name}</div>
        <div class="sli-hl">${previews[i]}</div>
      </div>
    </div>`
  ).join('');
}

// ─── EDITOR ───────────────────────────────────────────────────────────────────
function selectSlide(i) {
  activeSlide = i;
  document.getElementById('ed-name').textContent = SLIDES[i].name;
  buildEditorFields(i);
  renderSlideList();
  document.querySelectorAll('.sc-wrap').forEach((w,j) => w.classList.toggle('active', j===i));
  setTimeout(() => {
    const nodes = document.querySelectorAll('.sc-wrap');
    if(nodes[i]) nodes[i].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 50);
}

function buildEditorFields(i) {
  const f = {
    0: `
      <div class="fg"><label class="fl">Campeão da rodada</label><input class="fi" value="${esc(data.champ)}" oninput="set('champ',this.value)"></div>
      <div class="fg"><label class="fl">Partidas (uma por linha: A · 6×4 · B)</label><textarea class="fta" oninput="set('matches',this.value)">${esc(data.matches)}</textarea></div>`,
    1: `
      <div class="fg"><label class="fl">Atualizado em</label><input class="fi" value="${esc(data.rankDate)}" oninput="set('rankDate',this.value)"></div>
      <p style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-faint);line-height:1.5;margin-top:4px;">O ranking usa os dados embutidos no arquivo. Edite o JSON para atualizar os atletas.</p>`,
    2: `
      <div class="fg"><label class="fl">Data da próxima rodada</label><input class="fi" value="${esc(data.nextDate)}" oninput="set('nextDate',this.value)"></div>
      <div class="fg"><label class="fl">Frase de encerramento</label><input class="fi" value="${esc(data.phrase)}" oninput="set('phrase',this.value)"></div>`,
  };
  document.getElementById('ed-fields').innerHTML = f[i] || '';
}

function set(key, value) {
  data[key] = value;
  renderSlideAt(activeSlide);
  renderSlideList();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() {
  syncGlobals();
  const container = document.getElementById('prev-scroll');
  container.innerHTML = '';
  SLIDES.forEach((_,i) => {
    const wrap = document.createElement('div');
    wrap.className = `sc-wrap ${i===activeSlide?'active':''}`;
    wrap.innerHTML = `<div class="sc-num">${SLIDES[i].num} / ${SLIDES.length}</div><div class="sc" id="sc-${i}">${slideHTML(i)}</div>`;
    wrap.addEventListener('click', () => selectSlide(i));
    container.appendChild(wrap);
  });
  renderSlideList();
}

function renderSlideAt(i) {
  syncGlobals();
  const el = document.getElementById(`sc-${i}`);
  if(el) el.innerHTML = slideHTML(i);
  document.querySelectorAll('.sc-wrap').forEach((w,j) => w.classList.toggle('active', j===activeSlide));
}

// ─── SLIDE HTML ───────────────────────────────────────────────────────────────
function slideHTML(i) {
  const th    = THEMES[themeIdx];
  const round = data.round  || '07';
  const date  = data.date   || '10 de maio';
  switch(i) {
    case 0: return s1_resultado(th, round, date);
    case 1: return s2_classificacao(th, round);
    case 2: return s3_proxima(th, round);
    default: return '';
  }
}

// ─── S1: RESULTADO DA RODADA ──────────────────────────────────────────────────
function s1_resultado(th, round, date) {
  const champ = esc(data.champ || 'Campeão');
  const lines = (data.matches || '').split('\n').filter(l => l.trim());
  const matchHtml = lines.map(line => {
    const p  = line.split('·').map(s => s.trim());
    const tA = esc(p[0]||'—'), sc = esc(p[1]||'6×4'), tB = esc(p[2]||'—');
    const [sa,sb] = sc.replace('×','x').split('x').map(Number);
    const aW = sa > sb;
    return `<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(26,58,42,.07);gap:6px;">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:${aW?900:700};font-size:12px;color:${th.s1t};text-transform:uppercase;letter-spacing:.03em;${!aW?'opacity:.38':''};">${tA}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:${th.s1t};text-align:center;white-space:nowrap;letter-spacing:.02em;">${sc}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:${!aW?900:700};font-size:12px;color:${th.s1t};text-transform:uppercase;letter-spacing:.03em;text-align:right;${aW?'opacity:.38':''}">${tB}</span>
    </div>`;
  }).join('');

  const noite = themeIdx === 2;
  const headerBg   = th.verde;
  const champBg    = th.verdeMid;
  const dividerCol = noite ? 'rgba(232,232,216,.06)' : 'rgba(26,58,42,.08)';
  const footerOp   = noite ? 'rgba(232,232,216,.2)' : 'rgba(26,58,42,.15)';

  return `
<div style="width:100%;height:100%;background:${th.s1bg};display:flex;flex-direction:column;font-family:'Barlow Condensed',sans-serif;overflow:hidden;">
  <div style="background:${headerBg};padding:13px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
    <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:${th.creme};text-transform:uppercase;letter-spacing:.06em;">Resultado · Rodada ${round}</span>
    <span style="font-family:'DM Mono',monospace;font-size:8px;color:${th.creme};opacity:.45;letter-spacing:.18em;">${date.toUpperCase()}</span>
  </div>
  <div style="background:${champBg};padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <span style="font-size:15px;">🏆</span>
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:7px;color:${th.creme};opacity:.5;letter-spacing:.22em;text-transform:uppercase;">Campeão da rodada</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:${th.creme};text-transform:uppercase;letter-spacing:.04em;line-height:1.1;">${champ}</div>
    </div>
  </div>
  <div style="flex:1;overflow:hidden;border-top:1px solid ${dividerCol};">${matchHtml}</div>
  <div style="padding:9px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid ${dividerCol};flex-shrink:0;">
    <span style="font-family:'DM Mono',monospace;font-size:7px;color:${th.s1t};opacity:.3;letter-spacing:.15em;">Ver classificação →</span>
    <svg width="18" height="21" viewBox="0 0 200 230">
      <path d="M100 10 L185 45 L185 130 Q185 185 100 220 Q15 185 15 130 L15 45 Z" fill="none" stroke="${th.verde}" stroke-width="8" opacity=".2"/>
      <text x="100" y="140" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="80" fill="${th.verde}" opacity=".2">SV</text>
    </svg>
  </div>
</div>`;
}

// ─── S2: CLASSIFICAÇÃO (2 colunas) ────────────────────────────────────────────
function s2_classificacao(th, round) {
  const rd      = esc(data.rankDate || RANKING_DATA.atualizado_em);
  const season  = esc(data.season   || '2026');
  const players = RANKING_DATA.ranking;
  const mid     = Math.ceil(players.length / 2);
  const col1    = players.slice(0, mid);
  const col2    = players.slice(mid);
  const colGrid = '22px 1fr 18px 30px 24px';
  const colHeaders = ['POS','ATLETA','J','%V','SG'];

  function colHeaderHtml() {
    return `<div style="display:grid;grid-template-columns:${colGrid};padding:3px 8px;background:#2e312e;border-bottom:1px solid rgba(255,255,255,.06);">
      ${colHeaders.map((h,i) => `<span style="font-family:'Inter',sans-serif;font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9dd3aa;text-align:${i===1?'left':'center'};">${h}</span>`).join('')}
    </div>`;
  }

  function rowsHtml(col) {
    return col.map((j, idx) => {
      const isEven  = idx % 2 === 0;
      const isPodio = j.posicao <= 3;
      const sgColor = j.saldo_games > 0 ? '#00361a' : j.saldo_games < 0 ? '#ba1a1a' : '#717971';
      const pvColor = j.percentual_vitorias >= 67 ? '#00361a' : j.percentual_vitorias >= 33 ? '#414942' : '#ba1a1a';
      return `<div style="display:grid;grid-template-columns:${colGrid};align-items:center;padding:3.5px 8px;background:${isEven?'#fff':'#f8faf5'};border-bottom:1px solid #e7e9e4;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;font-weight:${isPodio?700:500};color:${isPodio?'#00361a':'#717971'};text-align:center;">${j.posicao}</span>
        <span style="font-family:'Space Grotesk',sans-serif;font-weight:${isPodio?700:500};font-size:9px;color:#191c19;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${j.nome}</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#414942;text-align:center;">${j.jogos}</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;font-weight:500;color:${pvColor};text-align:center;">${j.percentual_vitorias}%</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;font-weight:500;color:${sgColor};text-align:right;">${j.saldo_games>0?'+':''}${j.saldo_games}</span>
      </div>`;
    }).join('');
  }

  return `
<div style="width:100%;height:100%;background:#f8faf5;display:flex;flex-direction:column;overflow:hidden;">
  <div style="background:${th.verde};padding:9px 14px 8px;flex-shrink:0;">
    <div style="font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.28em;color:rgba(232,232,216,.45);text-transform:uppercase;margin-bottom:3px;">SQUADRA VERDE · TEMPORADA ${season}</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;color:#e8e8d8;letter-spacing:-.01em;line-height:1.05;">Classificação Geral</div>
    <div style="font-family:'DM Mono',monospace;font-size:6px;color:rgba(232,232,216,.4);letter-spacing:.1em;margin-top:3px;">Após Rodada ${round} · Atualizado em ${rd}</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;flex:1;border-top:2px solid ${th.verde};overflow:hidden;">
    <div style="border-right:2px solid ${th.verde};overflow:hidden;">
      ${colHeaderHtml()}
      ${rowsHtml(col1)}
    </div>
    <div style="overflow:hidden;">
      ${colHeaderHtml()}
      ${rowsHtml(col2)}
    </div>
  </div>
  <div style="background:${th.verde};padding:5px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:6px;">
      <svg width="10" height="12" viewBox="0 0 200 230" fill="none">
        <path d="M100 10 L185 45 L185 130 Q185 185 100 220 Q15 185 15 130 L15 45 Z" fill="none" stroke="#3d7a54" stroke-width="10"/>
        <text x="100" y="140" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="80" fill="#3d7a54">SV</text>
      </svg>
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,232,216,.6);">Squadra Verde</span>
    </div>
    <span style="font-family:'DM Mono',monospace;font-size:7px;color:rgba(232,232,216,.3);letter-spacing:.1em;">Temporada ${season}</span>
  </div>
</div>`;
}

// ─── S3: PRÓXIMA RODADA ───────────────────────────────────────────────────────
function s3_proxima(th, round) {
  const nextRound = String(parseInt(round, 10) + 1).padStart(2, '0');
  const nextDate  = esc(data.nextDate || '24 de maio');
  const phrase    = esc(data.phrase   || 'Quem para a dupla 1?');
  const season    = esc(data.season   || '2026');
  return `
<div style="width:100%;height:100%;background:${th.s3bg};display:flex;flex-direction:column;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:9px;border:2px solid rgba(26,58,42,.12);pointer-events:none;z-index:2;"></div>
  <div style="position:absolute;inset:14px;border:1px solid rgba(26,58,42,.06);pointer-events:none;z-index:2;"></div>
  <div style="position:absolute;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:210px;color:rgba(26,58,42,.04);right:-18px;bottom:-40px;line-height:1;pointer-events:none;letter-spacing:-.05em;">${nextRound}</div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:32px 28px;position:relative;z-index:3;">
    <span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.3em;color:${th.s3t};opacity:.4;text-transform:uppercase;">Squadra Verde · ${season}</span>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:${th.s3t};opacity:.4;display:block;margin-bottom:4px;">Próxima rodada</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:62px;color:${th.s3t};text-transform:uppercase;line-height:.88;letter-spacing:-.02em;display:block;margin-bottom:12px;">Rodada<br>${nextRound}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:${th.s3t};text-transform:uppercase;letter-spacing:.15em;opacity:.7;display:block;margin-bottom:16px;">${nextDate}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:${th.offWhite};background:${th.verde};padding:8px 14px;display:inline-block;">Confirma sua presença 👇</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;font-size:12px;color:${th.s3t};opacity:.45;text-transform:uppercase;letter-spacing:.05em;max-width:160px;line-height:1.25;">"${phrase}"</span>
      <svg width="28" height="33" viewBox="0 0 200 230">
        <path d="M100 10 L185 45 L185 130 Q185 185 100 220 Q15 185 15 130 L15 45 Z" fill="none" stroke="${th.s3t}" stroke-width="5" opacity=".2"/>
        <ellipse cx="72" cy="108" rx="26" ry="36" fill="none" stroke="${th.s3t}" stroke-width="3" transform="rotate(-18 72 108)" opacity=".2"/>
        <ellipse cx="128" cy="108" rx="26" ry="36" fill="none" stroke="${th.s3t}" stroke-width="3" transform="rotate(18 128 108)" opacity=".2"/>
      </svg>
    </div>
  </div>
</div>`;
}

// ─── ESCAPE ───────────────────────────────────────────────────────────────────
function esc(str) {
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
async function exportCurrent() {
  await document.fonts.ready;
  const th = THEMES[themeIdx];
  await doExport(activeSlide, `sv-rodada${data.round}-${SLIDES[activeSlide].id}-${th.id}.png`);
}

async function exportAll() {
  await document.fonts.ready;
  const th = THEMES[themeIdx];
  toast(`Exportando 3 slides — tema ${th.name}...`);
  for(let i = 0; i < 3; i++) {
    await doExport(i, `sv-rodada${data.round}-${SLIDES[i].id}-${th.id}.png`);
    await sleep(380);
  }
  toast('Todos os slides exportados!');
}

async function doExport(i, filename) {
  const el = document.getElementById(`sc-${i}`);
  if(!el) return;
  try {
    const canvas = await html2canvas(el, {
      scale: 3, useCORS: true, allowTaint: true,
      backgroundColor: null, logging: false, width: 360, height: 360,
    });
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(err) {
    console.error(err);
    toast('Erro ao exportar. Tente novamente.');
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>
